{% include 'header.html' %}
{% if message %}
<script>
    alert('{{ message }}');
</script>
{% endif %}

<div class="auth-section py-10 bg-light-soft min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 p-5">
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle mb-4"
                            style="width: 80px; height: 80px;">
                            <i class="fa fa-user-lock text-primary fs-1"></i>
                        </div>
                        <h2 class="fw-bold text-dark mb-2">Welcome Back</h2>
                        <p class="text-muted">Sign in to manage your health</p>
                    </div>

                    <form action="/addlogin/" method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark small uppercase ls-1">Email Address</label>
                            <div class="input-group-simple">
                                <input type="email" name="email"
                                    class="form-control py-3 px-4 rounded-3 border-light-dark shadow-none"
                                    placeholder="name@example.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label fw-bold text-dark small uppercase ls-1">Password</label>
                                <a href="#" class="small text-primary text-decoration-none">Forgot Password?</a>
                            </div>
                            <div class="input-group-simple">
                                <input type="password" name="password"
                                    class="form-control py-3 px-4 rounded-3 border-light-dark shadow-none"
                                    placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="mb-4 d-flex align-items-center justify-content-between">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small text-muted" for="remember">Remember Me</label>
                            </div>
                            <span class="small text-success fw-bold"><i class="fa fa-shield-halved me-1"></i>
                                Secure</span>
                        </div>

                        <button type="submit"
                            class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow-sm transition-300 transform-active mb-4">
                            SIGN IN
                        </button>

                        <div class="text-center">
                            <p class="small text-muted mb-0">Don't have an account? <a href="/register/"
                                    class="text-primary fw-bold text-decoration-none">Register Here</a></p>
                        </div>
                    </form>

                    <hr class="my-5 opacity-10">

                    <div class="text-center">
                        <a href="/doctor" class="small text-muted text-decoration-none hover-primary">Are you a doctor?
                            <span class="text-primary fw-bold">Register as a Professional</span></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .bg-light-soft {
        background-color: #f8fafc;
    }

    .border-light-dark {
        border: 1px solid #e2e8f0;
    }

    .border-light-dark:focus {
        border-color: #3b82f6;
        background-color: #fff;
    }

    .ls-1 {
        letter-spacing: 0.5px;
    }

    .py-10 {
        padding: 80px 0;
    }

    .hover-primary:hover {
        color: #3b82f6 !important;
    }

    .transform-active:active {
        transform: scale(0.98);
    }

    .transition-300 {
        transition: all 0.3s ease;
    }
</style>

{% include 'footer.html' %}
