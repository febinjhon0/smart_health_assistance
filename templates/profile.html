{% include 'header.html' %}
{% load static %}

<style>
    .profile-card {
        background: white;
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 1px solid var(--border);
        transition: all 0.3s ease;
    }

    .profile-header {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        padding: 40px;
        text-align: center;
        color: white;
    }

    .profile-avatar {
        width: 120px;
        height: 120px;
        background: white;
        border-radius: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 50px;
        color: var(--primary);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .profile-body {
        padding: 40px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-label {
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 10px;
        display: block;
        font-size: 0.9rem;
    }

    .form-control {
        border-radius: 12px;
        padding: 14px 20px;
        border: 1px solid var(--border);
        font-size: 0.95rem;
        transition: all 0.2s;
        background: #f8fafc;
    }

    .form-control:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-light);
        background: white;
    }

    .btn-update {
        background: var(--primary);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        font-weight: 700;
        width: 100%;
        margin-top: 20px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .btn-update:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .alert-success {
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
</style>

<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="profile-card animate__animated animate__fadeIn">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fa fa-user"></i>
                    </div>
                    <h2 class="text-white mb-1">{{ patient.name }}</h2>
                    <p class="text-white text-opacity-75 mb-0">Patient Profile</p>
                </div>

                <div class="profile-body">
                    {% if message %}
                    <div class="alert-success">
                        <i class="fa fa-circle-check"></i>
                        {{ message }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-12 form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="name" class="form-control" value="{{ patient.name }}" required>
                            </div>
                            
                            <div class="col-md-6 form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" name="email" class="form-control" value="{{ patient.email }}" required>
                            </div>

                            <div class="col-md-6 form-group">
                                <label class="form-label">Phone Number</label>
                                <input type="text" name="phone" class="form-control" value="{{ patient.phone }}" required>
                            </div>

                            <div class="col-md-6 form-group">
                                <label class="form-label">Age</label>
                                <input type="number" name="age" class="form-control" value="{{ patient.age }}" required>
                            </div>

                            <div class="col-md-6 form-group">
                                <label class="form-label">Gender</label>
                                <select name="gender" class="form-control" required>
                                    <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                                    <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                                    <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>

                            <div class="col-md-12 form-group">
                                <label class="form-label">New Password (Leave blank to keep current)</label>
                                <input type="password" name="password" class="form-control" placeholder="••••••••">
                            </div>

                            <div class="col-md-12">
                                <button type="submit" class="btn-update">
                                    <i class="fa fa-save"></i> Update Profile
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% include 'footer.html' %}
